<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .status {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .status strong { color: #1a1a1a; }
    .hint {
      font-size: 12px;
      color: #999;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 6px;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .links a {
      font-size: 12px;
      color: #7c3aed;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon-48.png" alt="Skip This Job">
    <h1>Skip This Job</h1>
  </div>

  <div class="status">
    Browse any job listing on <strong>LinkedIn</strong> or <strong>Indeed</strong> and a ghost risk score will appear automatically on the page.
  </div>

  <div class="hint">
    Not seeing scores? Make sure you're on an actual job listing page, not just the search results.
  </div>

  <div class="links">
    <a href="https://skipthisjob.com" target="_blank">skipthisjob.com</a>
    <a href="https://skipthisjob.com/#lookup" target="_blank">Employer Lookup</a>
    <a href="https://vibelabsmarketing.com" target="_blank">by Vibe Labs Marketing</a>
  </div>
</body>
</html>
